name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

permissions:
  contents: read

jobs:
  lint:
    name: Lint (Non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Ruff
        id: ruff
        run: |
          if ruff check . --output-format=github; then
            echo "ruff_status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "ruff_status=failed" >> "$GITHUB_OUTPUT"
            echo "::warning::Ruff reported issues (non-blocking)"
          fi

      - name: Mypy
        id: mypy
        run: |
          if python -m mypy src/pyinkui --show-error-codes; then
            echo "mypy_status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "mypy_status=failed" >> "$GITHUB_OUTPUT"
            echo "::warning::Mypy reported issues (non-blocking)"
          fi

      - name: Lint Summary
        if: always()
        run: |
          echo "Ruff: ${{ steps.ruff.outputs.ruff_status || 'unknown' }}"
          echo "Mypy: ${{ steps.mypy.outputs.mypy_status || 'unknown' }}"

  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run tests
        run: pytest -q

  summary:
    name: Workflow Summary
    runs-on: ubuntu-latest
    needs: [lint, tests]
    if: always()
    steps:
      - name: Display Summary
        run: |
          echo "Lint job: ${{ needs.lint.result || 'skipped' }}"
          echo "Tests job: ${{ needs.tests.result || 'skipped' }}"
          echo "Primary pass/fail is determined by the tests matrix."
